<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JESA BIM 3D - Monitoring Final Corrigé</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        body { margin: 0; background-color: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(10, 10, 10, 0.95); padding: 20px; 
            border-left: 6px solid #ff6b00; z-index: 100; border-radius: 4px;
            min-width: 280px;
        }
        .logo { font-family: 'Orbitron', sans-serif; color: #ff6b00; font-size: 14px; margin-bottom: 15px; }
        .info-massif { font-size: 12px; line-height: 1.6; margin-bottom: 15px; color: #ccc; }
        .info-massif strong { color: #fff; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .val { color: #ff6b00; font-weight: bold; }
        .val-green { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="logo">JESA SMART MONITORING</div>
        <div class="info-massif">
            ID Massif : <strong>MS-ST-2024-001</strong><br>
            Type Béton : <strong>CEM III/A (Bas Carbone)</strong><br>
            Date Coulage : <strong>14/05/2026</strong>
        </div>
        <div class="data-row"><span>Armatures Principales (As)</span><span id="v-as" class="val-green">---</span></div>
        <div class="data-row"><span>Armatures Horizontales (Ah)</span><span id="v-ah" class="val">---</span></div>
        <div class="data-row"><span>Armatures Verticales (At)</span><span id="v-at" class="val">---</span></div>
    </div>

<script type="module">
import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

// --- RÉCUPÉRATION DYNAMIQUE ---
const p = new URLSearchParams(window.location.search);
const decode = (s) => s ? decodeURIComponent(s.replace(/\+/g, ' ')).replace(/_/g, ' ') : null;

document.getElementById('v-as').innerText = (p.get('as') || "5.21") + " cm²";
document.getElementById('v-ah').innerText = decode(p.get('n1')) || "6 HA10";
document.getElementById('v-at').innerText = decode(p.get('at')) || "2 × 2 HA8";

const asText = decode(p.get('as_detail')) || "8 HA12";
const ahText = decode(p.get('n1')) || "6 HA10";
const atText = decode(p.get('at')) || "2 × 2 HA8";

function getFirstNumber(text, defaultValue) {
    const match = String(text || "").match(/\d+/);
    return match ? parseInt(match[0], 10) : defaultValue;
}

function getTotalFromMultiplication(text, defaultValue) {
    const clean = String(text || "").replace(/HA\d+/gi, "");
    const matches = clean.match(/\d+/g);
    if (!matches || matches.length === 0) return defaultValue;

    if (clean.includes("×") || clean.toLowerCase().includes("x")) {
        return matches.slice(0, 2).map(n => parseInt(n, 10)).reduce((a, b) => a * b, 1);
    }

    return parseInt(matches[0], 10);
}

const nbAs3D = Math.max(1, getFirstNumber(asText, 8));
const nbAh3D = Math.max(1, getFirstNumber(ahText, 6));
const nbAt3D = Math.max(1, getFirstNumber(atText, 3));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer));

const group = new THREE.Group();
scene.add(group);

const matBeton = new THREE.MeshStandardMaterial({ color: 0x888888, transparent: true, opacity: 0.3 });
const matAcierSolide = new THREE.MeshStandardMaterial({ color: 0xff6b00, metalness: 0.8 });

function addDashedPolyline(points, color) {
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineDashedMaterial({ color: color, dashSize: 0.05, gapSize: 0.03 });
    const line = new THREE.Line(geometry, material);
    line.computeLineDistances();
    group.add(line);
}

function addSolidPolyline(points, color) {
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ color: color });
    group.add(new THREE.Line(geometry, material));
}

const yOffset = 0.5, Lcorb = 0.75, hNez = 0.25, h = 0.6, b = 0.4;
const zG = -b / 2, xStartCorb = 0.25;

// Béton
group.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 3.0, 0.5), matBeton));
const shape = new THREE.Shape();
shape.moveTo(0, 0); shape.lineTo(Lcorb, 0); shape.lineTo(Lcorb, -hNez); shape.lineTo(0, -h); shape.lineTo(0, 0);
const meshC = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: b, bevelEnabled: false }), matBeton);
meshC.position.set(xStartCorb, yOffset, zG);
group.add(meshC);

// --- 1. AS : POINTILLÉS ORANGE ---
for (let i = 0; i < nbAs3D; i++) {
    const z = zG + 0.05 + (i * (b - 0.1) / Math.max(1, nbAs3D - 1));
    addDashedPolyline([
        new THREE.Vector3(-0.15, yOffset - h + 0.05, z),
        new THREE.Vector3(-0.15, yOffset - 0.03, z),
        new THREE.Vector3(xStartCorb + Lcorb - 0.05, yOffset - 0.03, z),
        new THREE.Vector3(xStartCorb + Lcorb - 0.05, yOffset - hNez + 0.03, z),
        new THREE.Vector3(xStartCorb + 0.05, yOffset - h + 0.05, z)
    ], 0xff6b00);
}

// --- 2. BARRES DU POTEAU (REMISES) ---
const xPos = [-0.15, 0.15];
const zPos = [zG + 0.05, zG + b - 0.05];
xPos.forEach(x => {
    zPos.forEach(z => {
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 3.0, 8), matAcierSolide);
        bar.position.set(x, 0, z);
        group.add(bar);
    });
});

// --- 3. AH : PLEIN BLEU (Lignes continues) ---
for (let j = 0; j < nbAh3D; j++) {
    const y = (yOffset - 0.18) - (j * 0.12);
    if (y > yOffset - h + 0.05) {
        addSolidPolyline([new THREE.Vector3(-0.15, y, zG + 0.03), new THREE.Vector3(xStartCorb + Lcorb - 0.05, y, zG + 0.03)], 0x00ccff);
        addSolidPolyline([new THREE.Vector3(-0.15, y, zG + b - 0.03), new THREE.Vector3(xStartCorb + Lcorb - 0.05, y, zG + b - 0.03)], 0x00ccff);
    }
}

// --- 4. AT : PLEIN VERT ---
for (let k = 0; k < nbAt3D; k++) {
    const xLoc = 0.10 + (k * (Lcorb - 0.20) / Math.max(1, nbAt3D - 1));
    const hLoc = hNez + ((Lcorb - xLoc) / Lcorb) * (h - hNez);
    const xG = xStartCorb + xLoc;
    addSolidPolyline([
        new THREE.Vector3(xG, yOffset - 0.03, zG + 0.03), 
        new THREE.Vector3(xG, yOffset - 0.03, zG + b - 0.03),
        new THREE.Vector3(xG, yOffset - hLoc + 0.03, zG + b - 0.03), 
        new THREE.Vector3(xG, yOffset - hLoc + 0.03, zG + 0.03),
        new THREE.Vector3(xG, yOffset - 0.03, zG + 0.03)
    ], 0x2ecc71);
}

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(5, 10, 5);
scene.add(sun);

function animate() {
    renderer.setAnimationLoop(() => {
        if (!renderer.xr.isPresenting) {
            group.rotation.y += 0.005;
            camera.position.set(2.5, 1.5, 2.5);
            camera.lookAt(0, 0.5, 0);
        }
        renderer.render(scene, camera);
    });
}
animate();
</script>
</body>
</html>
