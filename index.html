<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JESA BIM 3D - Monitoring Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        body { margin: 0; background-color: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(10, 10, 10, 0.95); padding: 20px; 
            border-left: 6px solid #ff6b00; z-index: 100; border-radius: 4px;
        }
        .logo { font-family: 'Orbitron', sans-serif; color: #ff6b00; font-size: 14px; margin-bottom: 15px; }
        .info-massif { font-size: 12px; line-height: 1.6; margin-bottom: 15px; color: #ccc; }
        .info-massif strong { color: #fff; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .val { color: #ff6b00; font-weight: bold; }
        .val-green { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="logo">JESA SMART MONITORING</div>
        <div class="info-massif">
            ID Massif : <strong id="m-id">---</strong><br>
            Date Coulage : <strong id="m-date">---</strong>
        </div>
        <div class="data-row"><span>Section (As)</span><span id="v-as" class="val-green">---</span></div>
        <div class="data-row"><span>Tirants (n1)</span><span id="v-n1" class="val">---</span></div>
        <div class="data-row"><span>Horiz. (n2)</span><span id="v-n2" class="val">---</span></div>
    </div>

<script type="module">
import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

// --- RECUPERATION DYNAMIQUE DES DONNEES ---
const p = new URLSearchParams(window.location.search);
const decode = (s) => s ? decodeURIComponent(s.replace(/\+/g, ' ')).replace(/_/g, ' ') : '---';

// Affichage HUD
document.getElementById('m-id').innerText = decode(p.get('id'));
document.getElementById('m-date').innerText = decode(p.get('date'));
document.getElementById('v-as').innerText = p.get('as') + " cm²";
document.getElementById('v-n1').innerText = decode(p.get('n1'));
document.getElementById('v-n2').innerText = decode(p.get('n2'));

// Valeurs 3D
let h = (parseFloat(p.get('h')) || 600) / 1000;
let b = (parseFloat(p.get('b')) || 400) / 1000;
const n1 = parseInt(p.get('n1')) || 8;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer));

const group = new THREE.Group();
scene.add(group);

const matBeton = new THREE.MeshStandardMaterial({ color: 0x888888, transparent: true, opacity: 0.3 });
const matAcier = new THREE.MeshStandardMaterial({ color: 0xff6b00, metalness: 0.8 });
const matLine = new THREE.LineBasicMaterial({ color: 0xff6b00 });

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(5, 10, 5);
scene.add(sun);

// --- GEOMETRIE ---
const yOffset = 0.5;
const Lcorb = 0.75;
const zG = -b / 2;

// Poteau
group.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 3.0, 0.5), matBeton));

// Corbeau
const shape = new THREE.Shape();
shape.moveTo(0, 0); shape.lineTo(Lcorb, 0); shape.lineTo(Lcorb, -0.25); shape.lineTo(0, -h); shape.lineTo(0, 0);
const meshC = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: b, bevelEnabled: false }), matBeton);
meshC.position.set(0.25, yOffset, zG);
group.add(meshC);

// --- AJOUT DES 4 BARRES VERTICALES (EXTREMITES POTEAU) ---
const pos = [0.18, -0.18];
pos.forEach(x => {
    pos.forEach(z => {
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 3.0, 8), matAcier);
        bar.position.set(x, 0, z);
        group.add(bar);
    });
});

// --- TIRANTS AS (DESCENDENT DANS LE POTEAU) ---
for (let i = 0; i < n1; i++) {
    const zPos = zG + 0.05 + (i * (b - 0.1) / (n1 - 1 || 1));
    const pts = [
        new THREE.Vector3(-0.15, yOffset - h + 0.05, zPos),
        new THREE.Vector3(-0.15, yOffset - 0.03, zPos),
        new THREE.Vector3(0.25 + Lcorb - 0.05, yOffset - 0.03, zPos),
        new THREE.Vector3(0.25 + Lcorb - 0.05, yOffset - 0.22, zPos),
        new THREE.Vector3(0.25 + 0.1, yOffset - h + 0.05, zPos)
    ];
    const geom = new THREE.BufferGeometry().setFromPoints(pts);
    group.add(new THREE.Line(geom, matLine));
}

function animate() {
    renderer.setAnimationLoop(() => {
        if (!renderer.xr.isPresenting) {
            group.rotation.y += 0.005;
            camera.position.set(2.5, 1.5, 2.5);
            camera.lookAt(0, 0.5, 0);
        }
        renderer.render(scene, camera);
    });
}
animate();
</script>
</body>
</html>
