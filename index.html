<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JESA BIM 3D - Professionnel & AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        body { margin: 0; background-color: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #hud { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(10, 10, 10, 0.95); padding: 20px; 
            border-left: 6px solid #ff6b00; z-index: 100;
            border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            min-width: 280px;
        }
        .logo { font-family: 'Orbitron', sans-serif; color: #ff6b00; font-size: 14px; margin-bottom: 15px; }
        .info-massif { font-size: 13px; line-height: 1.6; margin-bottom: 20px; color: #ccc; }
        .info-massif strong { color: #fff; }
        .type-title { font-size: 14px; font-weight: 700; color: #ffffff; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 5px; }
        .label { color: #aaa; }
        .val { color: #ff6b00; font-weight: bold; }
        .val-green { color: #2ecc71; font-weight: bold; }
        
        .btn-magique {
            width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.3s;
            text-align: left; display: flex; align-items: center;
        }
        .btn-calc { background: #333; color: white; border: 1px solid #444; }
        .btn-temp { background: #005bb7; color: white; }
        .btn-co2 { background: #1e7e34; color: white; }
        .btn-magique:hover { opacity: 0.8; transform: translateX(5px); }

        #ARButton {
            border: 1px solid #ff6b00 !important;
            background: rgba(17, 17, 17, 0.9) !important;
            color: #ff6b00 !important;
            border-radius: 4px !important;
            font-family: 'Orbitron' !important;
            bottom: 20px !important;
        }

        /* Styles ajoutés pour le dashboard graphique */
        #matu-container { margin-top: 15px; display: none; }
        #matuChart { background: #000; border: 1px solid #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="logo">JESA SMART MONITORING</div>
        <div class="info-massif">
            ID Massif : <strong>MS-ST-2024-001</strong><br>
            Type Béton : <strong>CEM III/A (Bas Carbone)</strong><br>
            Date Coulage : <strong>14/05/2026</strong>
        </div>

        <div id="txt-type" class="type-title">IDENTIFICATION...</div>
        
        <div class="data-row"><span class="label">Section théorique (As)</span><span id="v-as" class="val-green">---</span></div>
        <div class="data-row"><span id="lbl-n1" class="label">---</span><span id="v-n1" class="val">---</span></div>
        <div class="data-row"><span id="lbl-n2" class="label">---</span><span id="v-n2" class="val">---</span></div>
        <div class="data-row"><span class="label">Frettage / Cadres</span><span id="v-cf" class="val">---</span></div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">

        <button id="btn-ndc" class="btn-magique btn-calc">📄 NOTE DE CALCUL</button>
        
        <button class="btn-magique btn-temp" onclick="showMaturityDashboard()">🌡️ SMART CURING</button>
        
        <div id="matu-container">
            <canvas id="matuChart" width="280" height="120"></canvas>
        </div>

        <button class="btn-magique btn-co2" onclick="alert('Économie CO2 : 64%')">🌱 IMPACT CO2</button>
    </div>

<script type="module">
import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

// --- CONFIGURATION ---
const p = new URLSearchParams(window.location.search);
const type = (p.get('type') || 'CORBEAU').toUpperCase();

let h_raw = parseFloat(p.get('h')) || 600;
let h = h_raw > 10 ? h_raw/1000 : h_raw;
let b_raw = parseFloat(p.get('b')) || 400;
let b = b_raw > 10 ? b_raw/1000 : b_raw;

const asStr = p.get('as') || '12.50*8*6*0.40*0.30*3'; 
const parts = asStr.split('*').map(s => s.trim());

const sectionValue = (parts[0] && parts[0] !== "0.00") ? parts[0] : "12.50";
const n1 = parseInt(parts[1]) || 8; 
const n2 = parseInt(parts[2]) || 6; 
const nbCF = parseInt(parts[5]) || 3; 

document.getElementById('v-as').innerText = sectionValue + " cm²";
document.getElementById('v-n1').innerText = n1 + " HA";
document.getElementById('v-n2').innerText = n2 + " HA";
document.getElementById('v-cf').innerText = n2 + " cadres (Resserrés)";

const btnNdc = document.getElementById('btn-ndc');

// --- FONCTION DE CALCUL DE MATURIMÉTRIE (Loi d'Arrhenius) ---
window.calculerMaturite = function(donneesCapteurUsine) {
    // 1. LE PASSÉ : On récupère l'historique thermique (ex: 32°C de moyenne)
    let tempMoyenne = 32; 
    let ageReel = 18; // 18 heures depuis le coulage
    
    // Calcul de l'Âge Équivalent (Simplifié pour la démo)
    // Le béton mûrit plus vite car l'usine a chauffé (32°C au lieu de 20°C)
    let ageEquivalent = ageReel * Math.pow(2, (tempMoyenne - 20) / 10); 
    
    // Résistance estimée en MPa
    let fck = 35 * (ageEquivalent / (ageEquivalent + 5));
    return fck.toFixed(1);
}

// --- LE DASHBOARD GRAPHIQUE ---
window.drawPredictiveChart = function() {
    const canvas = document.getElementById('matuChart');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,280,120);

    // --- LE PASSÉ (Données réelles enregistrées) ---
    ctx.strokeStyle = "#00d4ff"; // Bleu : La vie du béton
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(30, 100);
    
    // On trace jusqu'à l'heure actuelle (ex: 18h)
    for(let x = 0; x < 180; x++) {
        let t = x / 10;
        let y = 100 - (35 * (t / (t + 2.5)) * 2.5);
        ctx.lineTo(x + 30, y);
    }
    ctx.stroke();

    // --- LA PLANIFICATION PRÉDICTIVE (Le futur pointillé) ---
    ctx.setLineDash([2, 4]);
    ctx.strokeStyle = "#aaa"; // Gris : Ce qui va arriver
    ctx.beginPath();
    ctx.moveTo(210, 45); // On part de maintenant
    for(let x = 180; x < 240; x++) {
        let t = x / 10;
        let y = 100 - (35 * (t / (t + 2.5)) * 2.5);
        ctx.lineTo(x + 30, y);
    }
    ctx.stroke();
    ctx.setLineDash([]); // Reset

    // --- LES SEUILS DE DÉCISION ---
    // Seuil 15 MPa (Rouge - Manutention Usine)
    ctx.strokeStyle = "rgba(255, 68, 68, 0.5)";
    ctx.beginPath(); ctx.moveTo(30, 62); ctx.lineTo(270, 62); ctx.stroke();

    // Seuil 25 MPa (Vert - Montage JESA)
    ctx.strokeStyle = "rgba(46, 204, 113, 0.5)";
    ctx.beginPath(); ctx.moveTo(30, 37); ctx.lineTo(270, 37); ctx.stroke();
};

window.showMaturityDashboard = function() {
    const container = document.getElementById('matu-container');
    container.style.display = 'block';
    window.drawPredictiveChart();
    const res = window.calculerMaturite();
    alert('Résistance actuelle : ' + res + ' MPa\nMaturité : 88%\nDécoffrage : AUTORISÉ ✅');
}

// --- SCENE & RENDERER ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

const group = new THREE.Group();
scene.add(group);

function addEdges(mesh) {
    const edges = new THREE.EdgesGeometry(mesh.geometry);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
    mesh.add(line);
}

// --- MATERIAUX AMELIORES ---
const matBeton = new THREE.MeshStandardMaterial({ 
    color: 0x888888, 
    transparent: true, 
    opacity: 0.3,
    roughness: 0.9,
    metalness: 0.1
});
const matOrange = new THREE.MeshStandardMaterial({ 
    color: 0xff6b00, 
    metalness: 1.0, 
    roughness: 0.2 
});
const matLineOrange = new THREE.LineBasicMaterial({ color: 0xff6b00 });

const matBlanc = new THREE.MeshStandardMaterial({ 
    color: 0xffffff, 
    transparent: true, 
    opacity: 0.8,
    metalness: 0.5,
    roughness: 0.3,
    depthTest: true,
    polygonOffset: true,
    polygonOffsetFactor: -4,
    polygonOffsetUnits: -4
});

const matSocle = new THREE.MeshStandardMaterial({ 
    color: 0x666666, 
    transparent: true, 
    opacity: 0.4,
    roughness: 0.9
});

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5, 10, 7.5);
scene.add(sun);

// --- CONSTRUCTION DU MODELE ---
if (type === "CORBEAU") {
    document.getElementById('txt-type').innerText = "CORBEAU TRAPÉZOÏDAL";
    document.getElementById('lbl-n1').innerText = "Tirants Sup.";
    document.getElementById('lbl-n2').innerText = "Cadres Horiz.";
    
    const shape = new THREE.Shape();
    shape.moveTo(0,0); shape.lineTo(0.6,0); shape.lineTo(0.6,-0.25); shape.lineTo(0,-h); shape.lineTo(0,0);
    const geom = new THREE.ExtrudeGeometry(shape, { depth: b, bevelEnabled: false });
    const mesh = new THREE.Mesh(geom, matBeton);
    mesh.position.set(0.25, h/2, -b/2);
    addEdges(mesh);
    group.add(mesh);

    const poteauMain = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.5, 0.5), matBeton);
    addEdges(poteauMain);
    group.add(poteauMain);

    const hauteurPoteau = 2.0; 
    for(let i=0; i<4; i++) {
        const bp = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, hauteurPoteau, 8), matOrange);
        bp.position.set((i < 2 ? -0.15 : 0.15), 0, (i % 2 === 0 ? -0.15 : 0.15));
        addEdges(bp);
        group.add(bp);
    }

    // --- AJOUT DES CADRES DE CONFINEMENT DANS LE POTEAU (RESSERREMENT EC2) ---
    for(let k = 0; k < n2; k++) {
        const yCadre = (h/2) - (k * 0.12); // Resserrement visuel
        const dimP = 0.42; 
        const ptsP = [new THREE.Vector3(-dimP/2, yCadre, -dimP/2), new THREE.Vector3(dimP/2, yCadre, -dimP/2), new THREE.Vector3(dimP/2, yCadre, dimP/2), new THREE.Vector3(-dimP/2, yCadre, dimP/2), new THREE.Vector3(-dimP/2, yCadre, -dimP/2)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsP), matLineOrange));
    }

    for(let i=0; i<n1; i++){
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.75, 8), matOrange);
        bar.rotation.z = Math.PI/2;
        bar.position.set(0.45, h/2 - 0.05, -b/2 + 0.05 + (i*(b-0.1)/(n1-1||1)));
        addEdges(bar);
        group.add(bar);
    }
    for(let j=0; j<n2; j++){
        const yPos = (h/2) - 0.15 - (j * (h-0.35) / (n2-1||1));
        const pts = [new THREE.Vector3(0.28, yPos, -b/2+0.04), new THREE.Vector3(0.55, yPos, -b/2+0.04), new THREE.Vector3(0.55, yPos, b/2-0.04), new THREE.Vector3(0.28, yPos, b/2-0.04), new THREE.Vector3(0.28, yPos, -b/2+0.04)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLineOrange));
    }

    btnNdc.onclick = () => alert('Note de Structure : WinCorbeau\nEurocode 2 : CONFORME ✅\nL\'Eurocode 2 impose de resserrer ces cadres dans la zone où le corbeau "pousse" sur le poteau pour éviter que le béton n\'éclate.');

} else if (type === "DC") {
    document.getElementById('txt-type').innerText = "DALLE DE COMPRESSION";
    document.getElementById('lbl-n1').innerText = "Treillis Soudé (TS)";
    document.getElementById('lbl-n2').innerText = "Poutrelles / Travée";

    const eDC    = Math.max(h, 0.05);   // épaisseur dalle de compression (min 5 cm)
    const portee = b > 0.5 ? b : 2.4;  // portée de la travée
    const nbPoutrellesAffich = Math.max(n2, 3);
    const largeurTravee = portee * 0.8;
    const ePoutrelle = 0.16;            // hauteur poutrelle préfabriquée (16 cm)
    const bPoutrelle = 0.12;            // largeur âme poutrelle
    const bSemelle   = 0.30;            // largeur semelle poutrelle

    // Corps de la dalle de compression (nappe supérieure fine)
    const dalleDC = new THREE.Mesh(new THREE.BoxGeometry(portee, eDC, largeurTravee), matBeton);
    dalleDC.position.y = ePoutrelle + eDC / 2;
    addEdges(dalleDC);
    group.add(dalleDC);

    // Poutrelles préfabriquées en T inversé
    const espacePoutrelle = largeurTravee / Math.max(nbPoutrellesAffich - 1, 1);
    for (let k = 0; k < nbPoutrellesAffich; k++) {
        const zP = -largeurTravee / 2 + k * espacePoutrelle;

        // Âme (rib) de la poutrelle
        const ame = new THREE.Mesh(new THREE.BoxGeometry(portee, ePoutrelle, bPoutrelle), matSocle);
        ame.position.set(0, ePoutrelle / 2, zP);
        addEdges(ame);
        group.add(ame);

        // Semelle inférieure (table basse)
        const semelle = new THREE.Mesh(new THREE.BoxGeometry(portee, 0.04, bSemelle),
            new THREE.MeshStandardMaterial({ color: 0x555555, transparent: true, opacity: 0.5, roughness: 0.9 }));
        semelle.position.set(0, 0.02, zP);
        addEdges(semelle);
        group.add(semelle);

        // Armatures longitudinales de la poutrelle (2 barres)
        [-bPoutrelle * 0.3, bPoutrelle * 0.3].forEach(dz => {
            const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.010, 0.010, portee - 0.04, 8), matOrange);
            bar.rotation.z = Math.PI / 2;
            bar.position.set(0, 0.04, zP + dz);
            group.add(bar);
        });
    }

    // Entrevous (blocs de remplissage entre poutrelles) — représentés par des parallélépipèdes
    if (nbPoutrellesAffich > 1) {
        const nbEntrevous = nbPoutrellesAffich - 1;
        for (let k = 0; k < nbEntrevous; k++) {
            const zE = -largeurTravee / 2 + k * espacePoutrelle + espacePoutrelle / 2;
            const largeurEntrevous = espacePoutrelle - bPoutrelle - 0.01;
            if (largeurEntrevous > 0.01) {
                const entrevous = new THREE.Mesh(
                    new THREE.BoxGeometry(portee - 0.1, ePoutrelle - 0.02, largeurEntrevous),
                    new THREE.MeshStandardMaterial({ color: 0x8b6914, transparent: true, opacity: 0.45, roughness: 1.0 })
                );
                entrevous.position.set(0, (ePoutrelle - 0.02) / 2 + 0.01, zE);
                addEdges(entrevous);
                group.add(entrevous);
            }
        }
    }

    // Treillis soudé de la dalle de compression (mailles selon X et Z)
    const yTS = ePoutrelle + eDC - 0.015;
    const nbMaillesX = Math.max(n1, 5);
    const nbMaillesZ = Math.max(n1, 5);
    // Fils selon X
    for (let i = 0; i < nbMaillesZ; i++) {
        const zF = -largeurTravee / 2 + i * (largeurTravee / Math.max(nbMaillesZ - 1, 1));
        const fil = new THREE.Mesh(new THREE.CylinderGeometry(0.004, 0.004, portee - 0.04, 6), matOrange);
        fil.rotation.z = Math.PI / 2;
        fil.position.set(0, yTS, zF);
        group.add(fil);
    }
    // Fils selon Z
    for (let j = 0; j < nbMaillesX; j++) {
        const xF = -portee / 2 + j * (portee / Math.max(nbMaillesX - 1, 1));
        const fil = new THREE.Mesh(new THREE.CylinderGeometry(0.004, 0.004, largeurTravee - 0.04, 6),
            new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 }));
        fil.rotation.x = Math.PI / 2;
        fil.position.set(xF, yTS + 0.008, 0);
        group.add(fil);
    }

    btnNdc.onclick = () => alert(
        'Note de Structure : Dalle de Compression (DC)\nEurocode 2 : CONFORME ✅\n' +
        'Épaisseur DC : ' + (eDC * 100).toFixed(0) + ' cm\n' +
        'Portée : ' + (portee * 100).toFixed(0) + ' cm\n' +
        'Poutrelles : ' + nbPoutrellesAffich + '\n' +
        'Treillis Soudé : ' + n1 + ' mailles'
    );

} else if (type === "POTEAU") {
    document.getElementById('txt-type').innerText = "POTEAU BÉTON ARMÉ";
    document.getElementById('lbl-n1').innerText = "Armatures Long.";
    document.getElementById('lbl-n2').innerText = "Cadres / Étriers";

    // Corps du poteau
    const poteauMesh = new THREE.Mesh(new THREE.BoxGeometry(b, h, b), matBeton);
    addEdges(poteauMesh);
    group.add(poteauMesh);

    // Armatures longitudinales (aux 4 coins + faces)
    const nbLong = Math.max(4, n1);
    const cover = 0.04;
    const positions = [];
    const side = b / 2 - cover;
    for (let i = 0; i < nbLong; i++) {
        const angle = (2 * Math.PI * i) / nbLong;
        positions.push({ x: side * Math.cos(angle), z: side * Math.sin(angle) });
    }
    positions.forEach(pos => {
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, h + 0.1, 8), matOrange);
        bar.position.set(pos.x, 0, pos.z);
        addEdges(bar);
        group.add(bar);
    });

    // Cadres / étriers
    const nbCadres = Math.max(n2, 4);
    for (let k = 0; k < nbCadres; k++) {
        const yC = -h / 2 + (k + 1) * (h / (nbCadres + 1));
        const dim = b - cover * 2;
        const pts = [
            new THREE.Vector3(-dim/2, yC, -dim/2),
            new THREE.Vector3( dim/2, yC, -dim/2),
            new THREE.Vector3( dim/2, yC,  dim/2),
            new THREE.Vector3(-dim/2, yC,  dim/2),
            new THREE.Vector3(-dim/2, yC, -dim/2)
        ];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLineOrange));
    }

    btnNdc.onclick = () => alert('Note de Structure : Poteau BA\nEurocode 2 : CONFORME ✅\nArmatures longitudinales : ' + n1 + ' HA\nCadres/Étriers : ' + n2);

} else if (type === "POUTRE") {
    document.getElementById('txt-type').innerText = "POUTRE BÉTON ARMÉ";
    document.getElementById('lbl-n1').innerText = "Armatures Inf.";
    document.getElementById('lbl-n2').innerText = "Armatures Sup. / Étriers";

    // Corps de la poutre (orientée horizontalement selon X)
    const poutreMesh = new THREE.Mesh(new THREE.BoxGeometry(h, b, b * 1.5), matBeton);
    addEdges(poutreMesh);
    group.add(poutreMesh);

    const cover = 0.04;
    const halfL = h / 2;
    const halfB = b / 2 - cover;
    const halfD = (b * 1.5) / 2 - cover;

    // Armatures inférieures (nappe basse)
    for (let i = 0; i < n1; i++) {
        const zPos = -halfD + cover + i * ((b * 1.5 - 2 * cover) / Math.max(n1 - 1, 1));
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, h - 0.06, 8), matOrange);
        bar.rotation.z = Math.PI / 2;
        bar.position.set(0, -halfB, zPos);
        addEdges(bar);
        group.add(bar);
    }

    // Armatures supérieures
    for (let i = 0; i < n2; i++) {
        const zPos = -halfD + cover + i * ((b * 1.5 - 2 * cover) / Math.max(n2 - 1, 1));
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.010, 0.010, h - 0.06, 8),
            new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 }));
        bar.rotation.z = Math.PI / 2;
        bar.position.set(0, halfB, zPos);
        addEdges(bar);
        group.add(bar);
    }

    // Étriers
    const nbEtriers = Math.max(nbCF, 5);
    for (let k = 0; k < nbEtriers; k++) {
        const xE = -halfL + (k + 1) * ((h) / (nbEtriers + 1));
        const dimY = b - cover * 2;
        const dimZ = b * 1.5 - cover * 2;
        const pts = [
            new THREE.Vector3(xE, -dimY/2, -dimZ/2),
            new THREE.Vector3(xE,  dimY/2, -dimZ/2),
            new THREE.Vector3(xE,  dimY/2,  dimZ/2),
            new THREE.Vector3(xE, -dimY/2,  dimZ/2),
            new THREE.Vector3(xE, -dimY/2, -dimZ/2)
        ];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLineOrange));
    }

    btnNdc.onclick = () => alert('Note de Structure : Poutre BA\nEurocode 2 : CONFORME ✅\nArmatures inf. : ' + n1 + ' HA\nArmatures sup. : ' + n2 + ' HA');

} else if (type === "DALLE") {
    document.getElementById('txt-type').innerText = "DALLE BÉTON ARMÉ";
    document.getElementById('lbl-n1').innerText = "Nappe X (Armatures)";
    document.getElementById('lbl-n2').innerText = "Nappe Y (Armatures)";

    const epaisseur = h; // épaisseur de la dalle
    const largeur = b > 0.5 ? b : 2.0; // largeur en plan
    const longueur = largeur * 1.2;

    // Corps de la dalle
    const dalleMesh = new THREE.Mesh(new THREE.BoxGeometry(longueur, epaisseur, largeur), matBeton);
    addEdges(dalleMesh);
    group.add(dalleMesh);

    const cover = 0.02;
    const yBas = -epaisseur / 2 + cover;
    const yHaut = epaisseur / 2 - cover;

    // Nappe X (armatures selon X, parallèles à la longueur)
    for (let i = 0; i < n1; i++) {
        const zPos = -largeur / 2 + cover + i * ((largeur - 2 * cover) / Math.max(n1 - 1, 1));
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, longueur - 0.06, 8), matOrange);
        bar.rotation.z = Math.PI / 2;
        bar.position.set(0, yBas, zPos);
        addEdges(bar);
        group.add(bar);
    }

    // Nappe Y (armatures selon Z, parallèles à la largeur)
    for (let j = 0; j < n2; j++) {
        const xPos = -longueur / 2 + cover + j * ((longueur - 2 * cover) / Math.max(n2 - 1, 1));
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, largeur - 0.06, 8),
            new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 }));
        bar.rotation.x = Math.PI / 2;
        bar.position.set(xPos, yHaut, 0);
        addEdges(bar);
        group.add(bar);
    }

    btnNdc.onclick = () => alert('Note de Structure : Dalle BA\nEurocode 2 : CONFORME ✅\nNappe X : ' + n1 + ' HA\nNappe Y : ' + n2 + ' HA\nÉpaisseur : ' + (epaisseur * 100).toFixed(0) + ' cm');

} else if (type === "VOILE") {
    document.getElementById('txt-type').innerText = "VOILE BÉTON ARMÉ";
    document.getElementById('lbl-n1').innerText = "Armatures Horiz.";
    document.getElementById('lbl-n2').innerText = "Armatures Vert.";

    const epaisseur = 0.20; // épaisseur du voile (20 cm par défaut)
    const largeurVoile = b > 0.3 ? b : 1.5;
    const hauteurVoile = h;

    // Corps du voile
    const voileMesh = new THREE.Mesh(new THREE.BoxGeometry(largeurVoile, hauteurVoile, epaisseur), matBeton);
    addEdges(voileMesh);
    group.add(voileMesh);

    const cover = 0.03;

    // Armatures horizontales (nappe avant et arrière)
    for (let i = 0; i < n1; i++) {
        const yPos = -hauteurVoile / 2 + cover + i * ((hauteurVoile - 2 * cover) / Math.max(n1 - 1, 1));
        // Nappe avant
        const barFront = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, largeurVoile - 0.04, 8), matOrange);
        barFront.rotation.z = Math.PI / 2;
        barFront.position.set(0, yPos, epaisseur / 2 - cover);
        addEdges(barFront);
        group.add(barFront);
        // Nappe arrière
        const barBack = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, largeurVoile - 0.04, 8), matOrange);
        barBack.rotation.z = Math.PI / 2;
        barBack.position.set(0, yPos, -(epaisseur / 2 - cover));
        addEdges(barBack);
        group.add(barBack);
    }

    // Armatures verticales (nappe avant et arrière)
    for (let j = 0; j < n2; j++) {
        const xPos = -largeurVoile / 2 + cover + j * ((largeurVoile - 2 * cover) / Math.max(n2 - 1, 1));
        // Nappe avant
        const barFront = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, hauteurVoile - 0.04, 8),
            new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 }));
        barFront.position.set(xPos, 0, epaisseur / 2 - cover);
        addEdges(barFront);
        group.add(barFront);
        // Nappe arrière
        const barBack = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, hauteurVoile - 0.04, 8),
            new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 }));
        barBack.position.set(xPos, 0, -(epaisseur / 2 - cover));
        addEdges(barBack);
        group.add(barBack);
    }

    // Épingles de liaison entre nappes
    const nbEpingles = Math.max(nbCF, 3);
    for (let i = 0; i < nbEpingles; i++) {
        for (let j = 0; j < nbEpingles; j++) {
            const xE = -largeurVoile / 2 + cover + i * ((largeurVoile - 2 * cover) / (nbEpingles - 1 || 1));
            const yE = -hauteurVoile / 2 + cover + j * ((hauteurVoile - 2 * cover) / (nbEpingles - 1 || 1));
            const epingle = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, epaisseur - 2 * cover, 6), matOrange);
            epingle.rotation.x = Math.PI / 2;
            epingle.position.set(xE, yE, 0);
            group.add(epingle);
        }
    }

    btnNdc.onclick = () => alert('Note de Structure : Voile BA\nEurocode 2 : CONFORME ✅\nArmatures horiz. : ' + n1 + ' HA\nArmatures vert. : ' + n2 + ' HA\nÉpaisseur : ' + (epaisseur * 100).toFixed(0) + ' cm');

} else {
    document.getElementById('txt-type').innerText = "SEMELLE À ENCUVEMENT";
    document.getElementById('lbl-n1').innerText = "Nappe X";
    document.getElementById('lbl-n2').innerText = "Nappe Y";

    const poteauA = parseFloat(parts[3]) || 0.40; 
    const eRadier = parseFloat(parts[4]) || 0.30; 
    const L = 1.6; const hf = h; const totalH = hf + eRadier;

    const socle = new THREE.Mesh(new THREE.BoxGeometry(L, eRadier, L), matSocle);
    socle.position.y = -totalH/2 + eRadier/2;
    addEdges(socle);
    group.add(socle);

    const s = new THREE.Shape();
    s.moveTo(-L/2, -L/2); s.lineTo(L/2, -L/2); s.lineTo(L/2, L/2); s.lineTo(-L/2, L/2); s.lineTo(-L/2, -L/2);
    const hole = new THREE.Path();
    hole.moveTo(-poteauA/2, -poteauA/2); hole.lineTo(poteauA/2, -poteauA/2); hole.lineTo(poteauA/2, poteauA/2); hole.lineTo(-poteauA/2, poteauA/2); hole.lineTo(-poteauA/2, -poteauA/2);
    s.holes.push(hole);
    const fut = new THREE.Mesh(new THREE.ExtrudeGeometry(s, { depth: hf, bevelEnabled: false }), matBeton);
    fut.rotation.x = Math.PI / 2; fut.position.y = -totalH/2 + eRadier + hf;
    addEdges(fut);
    group.add(fut);

    const hPV = hf + 0.8;
    const poteau = new THREE.Mesh(new THREE.BoxGeometry(poteauA-0.05, hPV, poteauA-0.05), matBlanc);
    poteau.position.y = -totalH/2 + eRadier + hPV/2 - 0.1;
    addEdges(poteau);
    group.add(poteau);

    const posA = [{x: 1, z: 1}, {x: 1, z: -1}, {x: -1, z: 1}, {x: -1, z: -1}];
    posA.forEach(p => {
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, hPV + 0.2, 8), matOrange);
        bar.position.set(((poteauA/2)-0.06)*p.x, poteau.position.y, ((poteauA/2)-0.06)*p.z);
        addEdges(bar);
        group.add(bar);
    });

    for (let k = 0; k < 6; k++) {
        const yP = (poteau.position.y - hPV/2) + (k * 0.25) + 0.1;
        const dim = poteauA - 0.08;
        const pts = [new THREE.Vector3(-dim/2, yP, -dim/2), new THREE.Vector3(dim/2, yP, -dim/2), new THREE.Vector3(dim/2, yP, dim/2), new THREE.Vector3(-dim/2, yP, dim/2), new THREE.Vector3(-dim/2, yP, -dim/2)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLineOrange));
    }

    for(let k=0; k < nbCF; k++){
        const dimF = L - 0.20;
        const yF = -totalH/2 + eRadier + (hf * (k+1)/(nbCF+1));
        const ptsF = [new THREE.Vector3(-dimF/2, yF, -dimF/2), new THREE.Vector3(dimF/2, yF, -dimF/2), new THREE.Vector3(dimF/2, yF, dimF/2), new THREE.Vector3(-dimF/2, yF, dimF/2), new THREE.Vector3(-dimF/2, yF, -dimF/2)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsF), matLineOrange));
    }

    const bL = -totalH/2;
    for(let i=0; i<n1; i++){
        const bX = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, L-0.1, 8), matOrange);
        bX.rotation.x = Math.PI/2; bX.position.set(-(L-0.2)/2 + (i*(L-0.2)/(n1-1||1)), bL+0.07, 0);
        addEdges(bX);
        group.add(bX);
    }
    for(let j=0; j<n2; j++){
        const bY = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, L-0.1, 8), 
            new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2, transparent: false }) 
        );
        bY.rotation.z = Math.PI/2; 
        bY.position.set(0, bL+0.11, -(L-0.2)/2 + (j*(L-0.2)/(n2-1||1)));
        addEdges(bY);
        group.add(bY);
    }

    btnNdc.onclick = () => alert('Note de Structure : WinSemelle\nEurocode 2 : CONFORME ✅');
}

// --- CONFIGURATION AR (HIT TEST & ANCRAGE) ---
const reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0xff6b00 })
);
reticle.matrixAutoUpdate = false;
reticle.visible = false;
scene.add(reticle);

const controller = renderer.xr.getController(0);
controller.addEventListener('select', () => {
    if (reticle.visible) {
        group.position.setFromMatrixPosition(reticle.matrix);
        group.visible = true;
    }
});
scene.add(controller);

let hitTestSource = null;
let hitTestSourceRequested = false;

function animate(timestamp, frame) {
    if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (hitTestSourceRequested === false) {
            session.requestReferenceSpace('viewer').then((space) => {
                session.requestHitTestSource({ space: space }).then((source) => {
                    hitTestSource = source;
                });
            });
            hitTestSourceRequested = true;
        }

        if (hitTestSource) {
            const hitTestResults = frame.getHitTestResults(hitTestSource);
            if (hitTestResults.length) {
                const hit = hitTestResults[0];
                reticle.visible = true;
                reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
            } else {
                reticle.visible = false;
            }
        }
    }

    if (!renderer.xr.isPresenting) {
        group.rotation.y += 0.004;
        camera.position.set(2.8, 2.2, 2.8);
        camera.lookAt(0,0,0);
    }

    renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
