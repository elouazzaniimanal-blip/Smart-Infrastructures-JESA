<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JESA BIM 3D - Corbeau Final avec At</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        body { margin: 0; background-color: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(10, 10, 10, 0.95); padding: 20px; 
            border-left: 6px solid #ff6b00; z-index: 100;
            border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            min-width: 280px;
        }
        .logo { font-family: 'Orbitron', sans-serif; color: #ff6b00; font-size: 14px; margin-bottom: 15px; }
        .info-massif { font-size: 12px; line-height: 1.6; margin-bottom: 15px; color: #ccc; }
        .type-title { font-size: 14px; font-weight: 700; color: #ffffff; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #444; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .val { color: #ff6b00; font-weight: bold; }
        .val-at { color: #2ecc71; font-weight: bold; }
        .val-ah { color: #00ccff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="logo">JESA SMART MONITORING</div>
        <div class="info-massif">ID : MS-ST-2024-001 | 14/05/2026</div>
        <div id="txt-type" class="type-title">CORBEAU JESA MASTER</div>
        <div class="data-row"><span class="label">As (Tirants inclinés)</span><span id="v-n1" class="val">---</span></div>
        <div class="data-row"><span class="label">Ah (Horizontales)</span><span id="v-ah" class="val-ah">---</span></div>
        <div class="data-row"><span class="label">At (Cadres verticaux)</span><span id="v-at" class="val-at">---</span></div>
    </div>

<script type="module">
import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

const p = new URLSearchParams(window.location.search);
let h = (parseFloat(p.get('h')) || 600) / 1000;
let b = (parseFloat(p.get('b')) || 400) / 1000;

const asStr = p.get('as') || '12.50*8*6*0.40*0.30*3'; 
const parts = asStr.split('*').map(s => s.trim());
const n1 = parseInt(parts[1]) || 8;  // As
const n2 = parseInt(parts[2]) || 6;  // Ah
const nAt = parseInt(parts[5]) || 3; // At (Cadres de frettage)

document.getElementById('v-n1').innerText = n1 + " HA";
document.getElementById('v-ah').innerText = n2 + " HA";
document.getElementById('v-at').innerText = nAt + " Cadres";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer));

const group = new THREE.Group();
scene.add(group);

const matBeton = new THREE.MeshStandardMaterial({ color: 0x888888, transparent: true, opacity: 0.3 });
const matAs = new THREE.LineBasicMaterial({ color: 0xff6b00 }); // Orange
const matAh = new THREE.LineBasicMaterial({ color: 0x00ccff }); // Bleu
const matAt = new THREE.LineBasicMaterial({ color: 0x2ecc71 }); // Vert (At)

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(5, 5, 5);
scene.add(sun);

function addPolyline(points, material) {
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geom, material);
    group.add(line);
}

// --- GÉOMÉTRIE BÉTON ---
const Lcorb = 0.75;
const hNez = 0.25;
const yTop = h / 2;
const zG = -b / 2;
const xStartCorb = 0.25;

const shape = new THREE.Shape();
shape.moveTo(0, 0); shape.lineTo(Lcorb, 0); shape.lineTo(Lcorb, -hNez); shape.lineTo(0, -h); shape.lineTo(0, 0);
const meshC = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: b, bevelEnabled: false }), matBeton);
meshC.position.set(xStartCorb, yTop, zG);
group.add(meshC);

group.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.5, 0.5), matBeton));

// --- 1. AS : TIRANTS INCLINÉS (FORME ROUGE) ---
for (let i = 0; i < n1; i++) {
    const z = zG + 0.05 + (i * (b - 0.1) / (n1 - 1 || 1));
    const ptsU = [
        new THREE.Vector3(-0.20, yTop - 0.15, z), 
        new THREE.Vector3(-0.20, yTop - 0.03, z),        
        new THREE.Vector3(xStartCorb + Lcorb - 0.05, yTop - 0.03, z),          
        new THREE.Vector3(xStartCorb + Lcorb - 0.05, yTop - (hNez - 0.03), z),
        new THREE.Vector3(xStartCorb + 0.1, yTop - (h - 0.05), z)
    ];
    addPolyline(ptsU, matAs);
}

// --- 2. AH : BARRES HORIZONTALES (DISTINCTES) ---
const espAh = 0.12;
for (let j = 0; j < n2; j++) {
    const y = (yTop - 0.18) - (j * espAh);
    if (y > yTop - h + 0.05) {
        for (let side = 0; side < 2; side++) {
            const z = (side === 0) ? zG + 0.03 : (zG + b) - 0.03;
            addPolyline([new THREE.Vector3(-0.2, y, z), new THREE.Vector3(xStartCorb + Lcorb - 0.05, y, z)], matAh);
        }
    }
}

// --- 3. AT : CADRES VERTICAUX (ADAPTATIFS) ---
const nbCadres = nAt;
const xSpaceAt = (Lcorb - 0.15) / (nbCadres - 1 || 1);

for (let k = 0; k < nbCadres; k++) {
    const xLoc = 0.10 + (k * xSpaceAt); // Position le long du corbeau
    const xGlobal = xStartCorb + xLoc;
    
    // Calcul de la hauteur locale du cadre en fonction de la pente
    const hLocale = hNez + ( (Lcorb - xLoc) / Lcorb ) * (h - hNez);
    const yBot = yTop - hLocale + 0.03;
    const yTopCadre = yTop - 0.03;

    const ptsAt = [
        new THREE.Vector3(xGlobal, yTopCadre, zG + 0.03),
        new THREE.Vector3(xGlobal, yTopCadre, zG + b - 0.03),
        new THREE.Vector3(xGlobal, yBot, zG + b - 0.03),
        new THREE.Vector3(xGlobal, yBot, zG + 0.03),
        new THREE.Vector3(xGlobal, yTopCadre, zG + 0.03) // Fermeture du cadre
    ];
    addPolyline(ptsAt, matAt);
}

function animate() {
    renderer.setAnimationLoop(() => {
        if (!renderer.xr.isPresenting) {
            group.rotation.y += 0.005;
            camera.position.set(2.2, 1.5, 2.2);
            camera.lookAt(0, 0, 0);
        }
        renderer.render(scene, camera);
    });
}
animate();
</script>
</body>
</html>
